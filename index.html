<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangkok Weather — Pixel Art Dashboard</title>
  <style>
    :root {
      /* Main theme gradients - BRIGHT for sunny, DIM for rain */
      --t-clear: linear-gradient(180deg, #65a3db 0%, #2668c0 40%, #1E70D7 100%);
      --t-clear-sunny: linear-gradient(180deg, #FFE4B5 0%, #FFD700 40%, #FFA500 100%);

      --t-cloudy: linear-gradient(180deg, #373b44 0%, #424854 100%);
      --t-rain:  linear-gradient(180deg, #1e2632 0%, #2f3e4f 100%);
      --t-hot:   linear-gradient(180deg, #2d1b00 0%, #6b3e00 50%, #b46700 100%);
      --t-night: linear-gradient(180deg, #0a0e17 0%, #1a2035 100%);

      /* Brightness card variants */
      --card-bright: rgba(255,255,255,0.15);
      --card-mid: rgba(255,255,255,0.1);
      --card-dark: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.25);
      --border-mid: rgba(255,255,255,0.15);
      --border-dark: rgba(255,255,255,0.1);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.75);
    }

    /* ── Brightness Theme Classes ── */
    body.bright {
      --card: var(--card-bright);
      --border: var(--border-bright);
    }
    body.bright .main-card {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 8px 32px rgba(77, 175, 255, 0.3), 0 2px 8px rgba(255,255,255,0.1);
    }
    /* ── Bright + Snow: additional contrast ── */
    body.bright .main-card {
      background: rgba(240, 248, 255, 0.28);
    }
    body.bright .main-card .temp-big { color: #ffffff; }
    body.bright .detail-card {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.35);
    }
    body.bright .detail-icon svg {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    body.bright .search-wrapper {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.3);
    }
    body.bright .search-input {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
    }
    body.bright .search-btn {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.3);
    }
    body.bright .weather-art svg rect {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    /* Bright text readability - text shadow on everything */
    body.bright h1,
    body.bright .city h1,
    body.bright .cityHeader h1 {
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      color: #ffffff;
    }
    body.bright .temp-big {
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    body.bright .desc {
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    body.bright .detail-val {
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    body.bright .detail-label {
      color: rgba(255,255,255,0.85);
    }
    body.bright .time-now {
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.9);
    }
    body.bright .feels {
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.85);
    }
    body.bright .footer {
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    body.bright p {
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    body.mid {
      --card: var(--card-mid);
      --border: var(--border-mid);
    }
    body.mid .main-card { background: rgba(255,255,255,0.15); }
    body.mid .detail-card { background: rgba(255,255,255,0.13); }
    body.mid .search-wrapper { background: rgba(255,255,255,0.15); }
    body.mid .search-input { background: rgba(255,255,255,0.1); }
    body.mid .search-btn { background: rgba(255,255,255,0.18); }

    body.dim {
      --card: var(--card-dark);
      --border: var(--border-dark);
    }
    body.dim .main-card { background: rgba(255,255,255,0.12); }
    body.dim .detail-card { background: rgba(255,255,255,0.1); }
    body.dim .search-wrapper { background: rgba(255,255,255,0.12); }
    body.dim .search-input { background: rgba(255,255,255,0.08); }
    body.dim .search-btn { background: rgba(255,255,255,0.15); }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--t-clear);
      color: var(--text);
      transition: background 2s ease;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .city {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .city h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .flag {
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .time-now {
      color: var(--text-dim);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    /* ── Search Input ── */
    .search-section {
      margin-bottom: 2rem;
    }
    .search-wrapper {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .search-input-group {
      display: flex;
      gap: 0.5rem;
    }
    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .search-input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.12);
    }
    .search-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover {
      background: rgba(255,255,255,0.25);
    }
    .search-btn:active {
      transform: scale(0.97);
    }
    .search-hint {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    .search-loading {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .search-error {
      color: #fca5a5;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.5rem;
      min-height: 1.25rem;
    }

    /* ── City Header (inside main card) ── */
    .cityHeader {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .cityHeader h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .cityHeader .flag {
      font-size: 1.5rem;
    }

    /* ── Pixel Grid ── */
    .pixel-grid {
      display: inline-grid;
      gap: 0;
      image-rendering: pixelated;
    }
    .pixel-grid svg {
      width: 100%;
      height: 100%;
    }

    /* ── Main Card ── */
    .main-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .weather-art {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }
    .temp-big {
      font-size: 5.5rem;
      font-weight: 200;
      line-height: 1;
      margin-bottom: 0.25rem;
      font-variant-numeric: tabular-nums;
    }
    .temp-big sup {
      font-size: 2rem;
      font-weight: 400;
      color: var(--text-dim);
    }
    .desc {
      font-size: 1.25rem;
      font-weight: 500;
      text-transform: capitalize;
    }
    .feels {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    /* ── Detail Grid ── */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .detail-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.25rem 0.5rem;
      text-align: center;
    }
    .detail-icon {
      width: 28px;
      height: 28px;
      margin: 0 auto 0.5rem;
    }
    .detail-icon svg {
      width: 100%;
      height: 100%;
      color: var(--text);
    }
    .detail-val {
      font-size: 1.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .detail-label {
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      font-size: 1.25rem;
      color: var(--text-dim);
    }
    .error {
      text-align: center;
      padding: 4rem 2rem;
      color: #fca5a5;
    }

    /* ── Animated Weather Background ── */
    .weather-bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    /* ── Sun Particles ── */
    .bg-sun-particle span {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #FFE4B5, transparent);
      box-shadow: 0 0 12px 4px rgba(255, 228, 181, 0.6);
    }
    .bg-sun-particle span::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent);
      opacity: 0;
      animation: sparkle 3s ease-in-out infinite;
    }
    .bg-sun-particle span:nth-child(1)::after { animation-delay: 0s; }

    .bg-sun-particle {
      position: absolute;
    }
    .bg-sun-particle:nth-child(1) {
      top: 20%;
      left: 15%;
      animation: float-sun 12s ease-in-out infinite;
    }
    .bg-sun-particle:nth-child(2) {
      top: 60%;
      left: 70%;
      animation: float-sun 15s ease-in-out infinite reverse;
      animation-delay: -3s;
    }
    .bg-sun-particle:nth-child(3) {
      top: 35%;
      left: 45%;
      animation: float-sun 10s ease-in-out infinite;
      animation-delay: -6s;
    }
    .bg-sun-particle:nth-child(4) {
      top: 75%;
      left: 25%;
      animation: float-sun 14s ease-in-out infinite reverse;
      animation-delay: -1s;
    }
    .bg-sun-particle:nth-child(5) {
      top: 15%;
      left: 80%;
      animation: float-sun 11s ease-in-out infinite;
      animation-delay: -5s;
    }
    .bg-sun-particle:nth-child(6) {
      top: 50%;
      left: 40%;
      animation: float-sun 13s ease-in-out infinite reverse;
      animation-delay: -8s;
    }

    @keyframes float-sun {
      0%, 100% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-30px) translateX(20px) scale(1.3);
        opacity: 1;
      }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
    }

    /* ── Cloud Layers ── */
    .bg-cloud-layer {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .cloud-cloud {
      position: absolute;
      width: 200px;
      height: 60px;
      background: radial-gradient(ellipse, rgba(200, 200, 220, 0.35), transparent);
      border-radius: 50%;
      height: 50px;
    }
    .cloud-cloud::before,
    .cloud-cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .cloud-cloud::before {
      width: 80px;
      height: 40px;
      top: -15px;
      left: 20px;
    }
    .cloud-cloud::after {
      width: 60px;
      height: 35px;
      top: -10px;
      right: 30px;
    }
    .cloud-cloud {
      top: 15%;
      left: 10%;
      animation: drift-cloud 30s ease-in-out infinite;
    }
    .cloud-cloud.c2 {
      top: 55%;
      left: 65%;
      width: 150px;
      animation: drift-cloud 25s ease-in-out infinite reverse;
      animation-delay: -10s;
    }
    .cloud-cloud.c3 {
      top: 35%;
      left: 45%;
      width: 120px;
      opacity: 0.7;
      animation: drift-cloud 35s ease-in-out infinite;
      animation-delay: -20s;
    }

    @keyframes drift-cloud {
      0%, 100% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 0.6;
      }
      50% {
        transform: translateX(60px) translateY(-20px) scale(1.1);
        opacity: 0.8;
      }
    }

    /* ── Rain Drops ── */
    .bg-rain-layer {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .rain-drop {
      position: absolute;
      width: 2px;
      height: 25px;
      background: linear-gradient(to bottom, transparent, rgba(100, 150, 255, 0.6));
      top: -25px;
      animation: rain-fall 2.5s linear infinite;
    }
    .rain-drop::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: -1px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(100, 150, 255, 0.4);
    }
    .rain-drop.r2 { left: 20%; animation-duration: 1.8s; animation-delay: -0.5s; }
    .rain-drop.r3 { left: 35%; animation-duration: 2.2s; animation-delay: -1.2s; }
    .rain-drop.r4 { left: 50%; animation-duration: 2.0s; animation-delay: -0.8s; }
    .rain-drop.r5 { left: 65%; animation-duration: 2.3s; animation-delay: -1.5s; }
    .rain-drop.r6 { left: 80%; animation-duration: 1.9s; animation-delay: -0.3s; }
    .rain-drop.r7 { left: 10%; animation-duration: 2.1s; animation-delay: -1.8s; }
    .rain-drop.r8 { left: 30%; animation-duration: 2.4s; animation-delay: -2.1s; }
    .rain-drop.r9 { left: 45%; animation-duration: 1.7s; animation-delay: -0.6s; }
    .rain-drop.r10 { left: 60%; animation-duration: 2.6s; animation-delay: -1.9s; }

    @keyframes rain-fall {
      0% {
        top: -25px;
        transform: translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        top: 100%;
        transform: translateX(15px);
        opacity: 0;
      }
    }

    /* ── Snow Flakes ── */
    .bg-snow-layer {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .snow-flake {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.9), 0 0 12px rgba(200, 220, 255, 0.3), 0 0 20px rgba(180, 200, 230, 0.2);
      top: -10px;
      animation: snow-fall 8s linear infinite;
    }
    /* ── Bright mode: darker snowflakes for contrast ── */
    body.bright .snow-flake {
      background: #E8F0FE;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.9), 0 0 12px rgba(180, 200, 240, 0.4), 0 0 20px rgba(160, 180, 220, 0.25);
    }
    .snow-flake.s1 { left: 10%; animation-duration: 9s; animation-delay: -3s; }
    .snow-flake.s2 { left: 15%; animation-duration: 10s; animation-delay: -2s; width: 4px; height: 4px; }
    .snow-flake.s3 { left: 25%; animation-duration: 7s; animation-delay: -5s; }
    .snow-flake.s4 { left: 35%; animation-duration: 9s; animation-delay: -1s; width: 5px; height: 5px; }
    .snow-flake.s5 { left: 45%; animation-duration: 11s; animation-delay: -4s; }
    .snow-flake.s6 { left: 55%; animation-duration: 8.5s; animation-delay: -3s; width: 4px; height: 4px; }
    .snow-flake.s7 { left: 65%; animation-duration: 10.5s; animation-delay: -7s; }
    .snow-flake.s8 { left: 75%; animation-duration: 7.5s; animation-delay: -6s; width: 5px; height: 5px; }
    .snow-flake.s9 { left: 85%; animation-duration: 9.5s; animation-delay: -2.5s; }
    .snow-flake.s10 { left: 5%; animation-duration: 8.2s; animation-delay: -8s; width: 4px; height: 4px; }

    @keyframes snow-fall {
      0% {
        top: -20px;
        transform: translateX(0) rotate(0deg) translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      50% {
        transform: translateX(20px) rotate(180deg) translateY(-10px);
      }
      90% {
        opacity: 1;
      }
      100% {
        top: 100%;
        transform: translateX(-20px) rotate(360deg) translateY(10px);
        opacity: 0;
      }
    }

    /* ── Night Stars ── */
    .bg-night-layer {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px white;
      animation: twinkle 4s ease-in-out infinite;
    }
    .star.st2 { left: 15%; top: 20%; animation-delay: -1s; animation-duration: 3.5s; width: 2px; height: 2px; }
    .star.st3 { left: 30%; top: 40%; animation-delay: -2s; animation-duration: 5s; }
    .star.st4 { left: 50%; top: 15%; animation-delay: -0.5s; animation-duration: 4.5s; width: 2px; height: 2px; }
    .star.st5 { left: 70%; top: 25%; animation-delay: -3s; animation-duration: 3s; }
    .star.st6 { left: 85%; top: 35%; animation-delay: -1.5s; animation-duration: 5.5s; width: 2px; height: 2px; }
    .star.st7 { left: 25%; top: 60%; animation-delay: -2.5s; animation-duration: 4s; }
    .star.st8 { left: 45%; top: 55%; animation-delay: -0.8s; animation-duration: 6s; width: 2px; height: 2px; }
    .star.st9 { left: 65%; top: 45%; animation-delay: -1.2s; animation-duration: 3.8s; }
    .star.st10 { left: 40%; top: 75%; animation-delay: -3.5s; animation-duration: 4.2s; width: 2px; height: 2px; }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.5);
      }
    }

    /* ── Lightning Flash ── */
    .bg-lightning {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.4), transparent);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .bg-lightning.flash {
      opacity: 1;
    }

    /* ── Animation Visibility Based on Weather ── */
    .weather-bg-animation {
      display: none;
    }
    .weather-bg-animation.sun {
      display: block;
      animation-name: sun-bg-mode;
    }
    .weather-bg-animation.sun .bg-sun-particle { display: block; }
    .weather-bg-animation.clouds {
      display: block;
    }
    .weather-bg-animation.clouds .bg-cloud-layer { display: block; }
    .weather-bg-animation.rain {
      display: block;
    }
    .weather-bg-animation.rain .bg-rain-layer { display: block; }
    .weather-bg-animation.snow {
      display: block;
    }
    .weather-bg-animation.snow .bg-snow-layer { display: block; }
    .weather-bg-animation.night {
      display: block;
    }
    .weather-bg-animation.night .bg-night-layer { display: block; }
    .weather-bg-animation.night .bg-cloud-layer { display: block; opacity: 0.4; }

    /* ── Active Layer Visibility ── */
    .weather-bg-animation.sun .bg-sun-particle,
    .weather-bg-animation.clouds .bg-cloud-layer,
    .weather-bg-animation.rain .bg-rain-layer,
    .weather-bg-animation.snow .bg-snow-layer,
    .weather-bg-animation.night .bg-night-layer {
      opacity: 1 !important;
    }

    /* ── Inactive Layer Visibility ── */
    .weather-bg-animation:not(.sun) .bg-sun-particle,
    .weather-bg-animation:not(.clouds):not(.night) .bg-cloud-layer,
    .weather-bg-animation:not(.rain) .bg-rain-layer,
    .weather-bg-animation:not(.snow) .bg-snow-layer,
    .weather-bg-animation:not(.night) .bg-night-layer {
      opacity: 0 !important;
    }

    /* ── Night Cloud Overlay Effect ── */
    .weather-bg-animation.night .bg-cloud-layer {
      opacity: 0.3;
    }

    /* ── Snow Overcast Effect ── */
    .weather-bg-animation.snow::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(160, 175, 200, 0.25) 0%, rgba(140, 155, 185, 0.18) 100%);
      pointer-events: none;
      z-index: 1;
    }
    /* ── Snow + Bright Theme: Darken overlay for contrast ── */
    body.bright .weather-bg-animation.snow::after {
      background: linear-gradient(180deg, rgba(140, 155, 185, 0.35) 0%, rgba(120, 135, 170, 0.25) 100%);
    }

    /* ── Reduced Motion Support ── */
    @media (prefers-reduced-motion: reduce) {
      .weather-bg-animation .bg-sun-particle,
      .weather-bg-animation .bg-cloud-layer .cloud-cloud,
      .weather-bg-animation .bg-rain-layer .rain-drop,
      .weather-bg-animation .bg-snow-layer .snow-flake,
      .weather-bg-animation .bg-night-layer .star {
        animation: none !important;
        opacity: 0.5 !important;
      }
      .weather-bg-animation .bg-sun-particle span,
      .weather-bg-animation .bg-cloud-layer .cloud-cloud,
      .weather-bg-animation .bg-rain-layer .rain-drop,
      .weather-bg-animation .bg-night-layer .star {
        transform: none !important;
      }
    }
  </style>
</head>

  <script>
    // ── Location State ──
    let currentLocation = {
      latitude: 13.7563,
      longitude: 100.5018,
      name: 'Bangkok',
      country: 'TH',
      timezone: 'Asia/Bangkok',
    };

    // Country flag emoji map
    const COUNTRY_FLAGS = {
      TH: '🇹🇭', JP: '🇯🇵', US: '🇺🇸', GB: '🇬🇧', DE: '🇩🇪', FR: '🇫🇷',
      IT: '🇮🇹', ES: '🇪🇸', PT: '🇵🇹', NL: '🇳🇱', BE: '🇧🇪', CH: '🇨🇭',

      CZ: '🇨🇿', RU: '🇷🇺', CN: '🇨🇳', KR: '🇰🇷', IN: '🇮🇳', ID: '🇮🇩',
      SG: '🇸🇬', MY: '🇲🇾', PH: '🇵🇭', VN: '🇻🇳', TH: '🇹🇭', AU: '🇦🇺',
      NZ: '🇳🇿', CA: '🇨🇦', BR: '🇧🇷', AR: '🇦🇷', MX: '🇲🇽', CO: '🇨🇴',
      ZA: '🇿🇦', EG: '🇪🇬', AE: '🇦🇪', SA: '🇸🇦', TR: '🇹🇷', QA: '🇶🇦',
      IL: '🇮🇱', AE: '🇦🇪', HU: '🇭🇺', RO: '🇷🇴', UA: '🇺🇦', IR: '🇮🇷',
    };

    function getFlagCode(countryCode) {
      if (!countryCode || countryCode.length !== 2) return '🌍';
      return String.fromCodePoint(
        ...[...countryCode.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65)
      );
    }

    // ── WMO Weather Codes (with brightness) ──
    const WMO_CODES = {
      0:  { desc: 'Clear Sky',      theme: 'clear',  brightness: 'bright' },
      1:  { desc: 'Mainly Clear',   theme: 'clear',  brightness: 'bright' },
      2:  { desc: 'Partly Cloudy',  theme: 'cloudy', brightness: 'mid' },
      3:  { desc: 'Overcast',       theme: 'cloudy', brightness: 'mid' },
      45: { desc: 'Foggy',          theme: 'cloudy', brightness: 'mid' },
      48: { desc: 'Rime Fog',       theme: 'cloudy', brightness: 'mid' },
      51: { desc: 'Light Drizzle',  theme: 'rain',   brightness: 'mid' },
      53: { desc: 'Moderate Drizzle', theme: 'rain', brightness: 'dim' },
      55: { desc: 'Dense Drizzle',  theme: 'rain',   brightness: 'dim' },
      56: { desc: 'Light Freezing D.', theme: 'rain', brightness: 'dim' },

      61: { desc: 'Slight Rain',    theme: 'rain',   brightness: 'mid' },
      63: { desc: 'Moderate Rain',  theme: 'rain',   brightness: 'dim' },
      65: { desc: 'Heavy Rain',     theme: 'rain',   brightness: 'dim' },
      66: { desc: 'Light Freezing R.', theme: 'rain', brightness: 'dim' },
      67: { desc: 'Heavy Freezing R.', theme: 'rain', brightness: 'dim' },
      71: { desc: 'Slight Snow',    theme: 'snow',   brightness: 'mid' },
      73: { desc: 'Moderate Snow',  theme: 'snow',   brightness: 'mid' },
      75: { desc: 'Heavy Snow',     theme: 'snow',   brightness: 'dim' },
      77: { desc: 'Snow Grains',    theme: 'snow',   brightness: 'mid' },
      80: { desc: 'Slight Showers', theme: 'rain',   brightness: 'mid' },
      81: { desc: 'Moderate Showers', theme: 'rain', brightness: 'dim' },
      82: { desc: 'Violent Showers', theme: 'rain',  brightness: 'dim' },
      85: { desc: 'Slight Snow Shw.', theme: 'snow', brightness: 'mid' },
      86: { desc: 'Heavy Snow Shw.',  theme: 'snow', brightness: 'dim' },
      95: { desc: 'Thunderstorm',   theme: 'rain',   brightness: 'dim' },
      96: { desc: 'Thunder. w/Hail', theme: 'rain',  brightness: 'dim' },
      99: { desc: 'Heavy Thndrst.',  theme: 'rain',  brightness: 'dim' },
    };

    function getWeatherInfo(code) {
      return WMO_CODES[code] || { desc: 'Unknown', theme: 'clear', brightness: 'mid' };
    }

    // ── Pixel Art SVGs ──
    const PixelArt = {
      sun: `<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="2" height="2" fill="#FFD700"/>
        <rect x="2" y="1" width="1" height="1" fill="#FFD700"/>
        <rect x="5" y="1" width="1" height="1" fill="#FFD700"/>
        <rect x="2" y="6" width="1" height="1" fill="#FFD700"/>
        <rect x="5" y="6" width="1" height="1" fill="#FFD700"/>
        <rect x="1" y="2" width="1" height="1" fill="#FFD700"/>
        <rect x="6" y="2" width="1" height="1" fill="#FFD700"/>
        <rect x="1" y="5" width="1" height="1" fill="#FFD700"/>
        <rect x="6" y="5" width="1" height="1" fill="#FFD700"/>
      </svg>`,

      sun_small: `<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="2" height="2" fill="#FFD700"/>
        <rect x="2" y="1" width="1" height="1" fill="#FFD700"/>
        <rect x="5" y="1" width="1" height="1" fill="#FFD700"/>
        <rect x="2" y="6" width="1" height="1" fill="#FFD700"/>
        <rect x="5" y="6" width="1" height="1" fill="#FFD700"/>
        <rect x="1" y="2" width="1" height="1" fill="#FFD700"/>
        <rect x="6" y="2" width="1" height="1" fill="#FFD700"/>
        <rect x="1" y="5" width="1" height="1" fill="#FFD700"/>
        <rect x="6" y="5" width="1" height="1" fill="#FFD700"/>
      </svg>`,

      cloud: `<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="3" width="6" height="3" fill="#E2E8F0"/>
        <rect x="2" y="2" width="2" height="1" fill="#E2E8F0"/>
        <rect x="4" y="2" width="2" height="1" fill="#E2E8F0"/>
        <rect x="2" y="4" width="1" height="1" fill="#CBD5E0"/>
        <rect x="5" y="4" width="1" height="1" fill="#CBD5E0"/>
        <rect x="3" y="5" width="2" height="1" fill="#CBD5E0"/>
      </svg>`,

      moon: `<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="1" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="1" width="1" height="1" fill="#FDE68A"/>
        <rect x="3" y="2" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="2" width="1" height="1" fill="#FDE68A"/>
        <rect x="2" y="3" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="3" width="1" height="1" fill="#FDE68A"/>
        <rect x="3" y="4" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="4" width="1" height="1" fill="#FDE68A"/>
        <rect x="3" y="5" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="5" width="1" height="1" fill="#FDE68A"/>
        <rect x="3" y="6" width="1" height="1" fill="#FDE68A"/>
        <rect x="4" y="6" width="1" height="1" fill="#FDE68A"/>
      </svg>`,

      rain: `<svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="1" height="1" fill="#60A5FA"/>
        <rect x="1" y="2" width="1" height="1" fill="#60A5FA"/>
        <rect x="1" y="3" width="1" height="1" fill="#60A5FA"/>
      </svg>`,

      snow: `<svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="0" width="1" height="1" fill="#E2E8F0"/>
        <rect x="0" y="1" width="1" height="1" fill="#E2E8F0"/>
        <rect x="1" y="1" width="1" height="1" fill="#E2E8F0"/>
        <rect x="2" y="1" width="1" height="1" fill="#E2E8F0"/>
        <rect x="1" y="2" width="1" height="1" fill="#E2E8F0"/>
        <rect x="0" y="3" width="1" height="1" fill="#E2E8F0"/>
        <rect x="1" y="3" width="1" height="1" fill="#E2E8F0"/>
        <rect x="2" y="3" width="1" height="1" fill="#E2E8F0"/>
      </svg>`,

      wind: `<svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="1" width="2" height="1" fill="#94A3B8"/>
        <rect x="1" y="2" width="2" height="1" fill="#94A3B8"/>
        <rect x="2" y="2" width="1  height="1"  fill="#94A3B8"/>
      </svg>`,

      uv: `<svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="2" height="2" fill="#EF4444"/>
        <rect x="0" y="1" width="1" height="1" fill="#FCA5A5"/>
        <rect x="3" y="1" width="1" height="1" fill="#FCA5A5"/>
        <rect x="1" y="2" width="2" height="1" fill="#EF4444"/>
      </svg>`,

      humidity: `<svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="0" width="2" height="1" fill="#60A5FA"/>
        <rect x="1" y="1" width="2" height="1" fill="#60A5FA"/>
        <rect x="1" y="2" width="2" height="1" fill="#60A5FA"/>
        <rect x="1" y="3" width="1" height="1" fill="#60A5FA"/>
      </svg>`,
    };

    // Timezone for display
    let localeTimezone = currentLocation.timezone;

    function getComputerTime() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Bangkok',
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      };
      return now.toLocaleString('en-US', options);
    }

    // ── Fetch Weather ──
    async function fetchWeather() {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.latitude}&longitude=${currentLocation.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&timezone=${encodeURIComponent(currentLocation.timezone)}`;
        const res = await fetch(url);
        const data = await res.json();
        renderWeather(data);
      } catch (err) {
        document.getElementById('mainCard').innerHTML = `
          <div class="error">Failed to load weather data.<br>Please check your connection and reload.</div>`;
      }
    }

    // ── Geocode City Name ──
    async function geocodeCity(cityName) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.results || data.results.length === 0) {
        throw new Error(`City "${cityName}" not found`);
      }
      const result = data.results[0];
      return {
        latitude: result.latitude,
        longitude: result.longitude,
        name: result.name,
        country: result.country_code || '',
        timezone: result.timezone || 'UTC',
        cityName: cityName,
      };
    }

    // ── Parse Coordinates ──
    function parseCoordinates(input) {
      // Handle formats: "13.75,100.50" or "lat,lng" or "lat lng"
      const parts = input.trim().split(/[\s,]+/);
      if (parts.length === 2) {
        const lat = parseFloat(parts[0]);
        const lng = parseFloat(parts[1]);
        if (!isNaN(lat) && !isNaN(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180) {
          return { latitude: lat, longitude: lng, name: `${lat.toFixed(2)}°N,${lng.toFixed(2)}°E`, country: '', timezone: 'UTC', isCoords: true, country_code: '' };
        }
      }
      return null;
    }

    // ── Search Handler ──
    async function handleSearch(input) {
      const searchBtn = document.getElementById('searchBtn');
      const searchError = document.getElementById('searchError');

      // Show loading
      searchBtn.innerHTML = '<span class="search-loading"></span>';
      searchBtn.disabled = true;
      searchError.textContent = '';

      try {
        // Try parsing as coordinates first
        const coords = parseCoordinates(input);
        let newLocation;

        if (coords) {
          newLocation = { ...coords, name: coords.name, isCoords: true };
        } else {
          // Try geocoding as city name
          newLocation = await geocodeCity(input);
          newLocation.isCoords = false;
        }

        currentLocation = newLocation;
        localeTimezone = currentLocation.timezone;

        // Update top header
        const topCity = document.querySelector('.header .city');
        if (topCity) {
          const flag = getFlagCode(currentLocation.country);
          topCity.innerHTML = `<h1>${currentLocation.name}</h1><span class="flag">${flag}</span>`;
        }

        // Fetch weather with new currentLocation
        fetchWeather();
      } catch (err) {
        searchError.textContent = err.message || 'Search failed';
      } finally {
        searchBtn.innerHTML = 'Search';
        searchBtn.disabled = false;
      }
    }

    // ── Initialize Search ──
    function initSearch() {
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const searchErrorDiv = document.getElementById('searchError');
      if (!searchErrorDiv) {
        const searchWrapper = document.querySelector('.search-wrapper');
        if (searchWrapper) {
          const errEl = document.createElement('div');
          errEl.className = 'search-error';
          errEl.id = 'searchError';
          searchWrapper.appendChild(errEl);
        }
      }

      searchBtn.addEventListener('click', () => {
        handleSearch(searchInput.value || 'Bangkok');
      });

      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleSearch(searchInput.value || 'Bangkok');
        }
      });
    }

    // ── Render Weather ──
    let info, code, isNight; // accessible by updateBackgroundAnimation
    function renderWeather(data) {
      const c = data.current;
      code = c.weather_code;
      info = getWeatherInfo(code);
      isNight = new Date().getHours() < 6 || new Date().getHours() >= 19;
      const isSunny = info.brightness === 'bright';

      // Set timezone for computer time
      if (!localeTimezone) localeTimezone = currentLocation.timezone;

      // Update city header in main card
      const cityHeader = document.getElementById('cityHeader');
      if (cityHeader) {
        const flag = getFlagCode(currentLocation.country);
        cityHeader.innerHTML = `<h1 id="headerCityName">${currentLocation.name}</h1><span class="flag" id="headerFlag">${flag}</span>`;
      }

      // Update time
      document.getElementById('timeNow').textContent = getComputerTime();

      // Set background theme
      let theme = info.theme;
      let brightness = info.brightness;
      if (isNight && theme !== 'rain' && theme !== 'snow') theme = 'night';
      if (isNight && theme !== 'rain' && theme !== 'snow') brightness = 'mid';
      const themeVar = `--t-${theme}`;
      document.body.style.background = `var(${themeVar})`;

      // Set brightness class (adds text shadows and color adjustments via CSS)
      document.body.className = brightness;

      // Render main card
      let weatherIcon;
      if (isNight) {
        weatherIcon = PixelArt.moon;
      } else if (theme === 'snow') {
        weatherIcon = PixelArt.snow;
      } else if (theme === 'rain') {
        weatherIcon = `${PixelArt.cloud}${PixelArt.rain}`;
      } else {
        weatherIcon = PixelArt.sun;
      }
      document.getElementById('weatherArt').innerHTML = weatherIcon;
      document.querySelector('.weather-art').style.display = 'flex';
      document.querySelector('.weather-art').style.justifyContent = 'center';
      document.querySelector('.weather-art').style.alignItems = 'center';

      document.getElementById('tempBig').innerHTML = `${Math.round(c.temperature_2m)}<sup>°C</sup>`;
      document.getElementById('weatherDesc').textContent = info.desc;
      document.getElementById('feelsLike').textContent = `Feels like ${Math.round(c.apparent_temperature)}°C`;

      // Render details
      document.getElementById('humidityIcon').innerHTML = PixelArt.humidity;
      document.getElementById('humidityVal').textContent = `${c.relative_humidity_2m}%`;
      document.getElementById('windIcon').innerHTML = PixelArt.wind;
      document.getElementById('windVal').textContent = `${Math.round(c.wind_speed_10m)} km/h`;
      document.getElementById('uvIcon').innerHTML = PixelArt.uv;
      document.getElementById('uvVal').textContent = c.uv_index != null ? Math.round(c.uv_index) : '—';

      // Update animated background
      updateBackgroundAnimation();
    }

    // ── Animated Background ──
    let lightningInterval = null;

    function updateBackgroundAnimation() {
      const bgAnim = document.getElementById('weatherBgAnim');
      const bgLightning = document.getElementById('bgLightning');
      if (!bgAnim) return;

      // Clear lightning interval
      if (lightningInterval) {
        clearInterval(lightningInterval);
        lightningInterval = null;
        if (bgLightning) bgLightning.classList.remove('flash');
      }

      // Determine weather type
      let weatherType = 'clear';
      if (info.theme === 'snow') {
        weatherType = 'snow';
      } else if (info.theme === 'rain') {
        weatherType = 'rain';
        // Flash lightning for thunderstorms (codes 95, 96, 99)
        if ((code >= 95 && code <= 99) && bgLightning) {
          lightningInterval = setInterval(() => {
            if (Math.random() < 0.3) {
              bgLightning.classList.add('flash');
              setTimeout(() => bgLightning.classList.remove('flash'), 150);
            }
          }, 4000);
        }
      } else if (info.theme === 'cloudy') {
        weatherType = 'clouds';
      } else if (isNight) {
        weatherType = 'night';
      }

      // Remove old classes
      bgAnim.className = 'weather-bg-animation';

      // Add new class
      bgAnim.classList.add(weatherType);
    }

    // ── Init ──
    initSearch();
    fetchWeather();
    setInterval(fetchWeather, 5 * 60 * 1000); // Refresh every 5 minutes
  </script>
</body>
</html>
